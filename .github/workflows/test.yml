name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest pydantic python-dotenv
          pip install langchain langgraph langchain-core langchain-openai
          pip install langchain-community langchain-text-splitters langchain-chroma
          pip install chromadb rank-bm25 jieba pandas
          pip install fastapi uvicorn streamlit requests
          pip install sentence-transformers

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=line 2>&1 | head -80
