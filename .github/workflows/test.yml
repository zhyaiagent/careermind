name: Test
on: push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install pytest
          pip install pydantic python-dotenv
          pip install langchain langgraph langchain-core
          pip install langchain-openai langchain-community
          pip install langchain-text-splitters langchain-chroma
          pip install chromadb rank-bm25 jieba pandas numpy
      - name: Run tests
        run: python -m pytest tests/ -v --tb=line
