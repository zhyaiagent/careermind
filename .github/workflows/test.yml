name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest pydantic python-dotenv langchain langgraph langchain-core langchain-openai langchain-community langchain-chroma langchain-tavily langchain-text-splitters langchain-huggingface chromadb sentence-transformers rank-bm25 jieba pandas fastapi uvicorn streamlit requests playwright beautifulsoup4

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short
