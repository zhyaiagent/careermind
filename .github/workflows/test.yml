name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest pydantic python-dotenv
          pip install langchain langgraph langchain-core langchain-openai langchain-community
          pip install langchain-text-splitters langchain-chroma langchain-huggingface
          pip install chromadb rank-bm25 jieba pandas numpy
          pip install fastapi uvicorn streamlit requests
          pip install sentence-transformers
          pip install playwright beautifulsoup4 PyMuPDF python-docx pdfplumber

      - name: Run tests
        run: |
          python -m pytest tests/ -v
