services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobsense
      POSTGRES_USER: jobsense
      POSTGRES_PASSWORD: jobsense123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobsense"]
      interval: 5s
      retries: 5

  mcp:
    build: .
    command: python scripts/mcp_server.py
    ports:
      - "9020:9020"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9020/health')"]
      interval: 10s
      retries: 5
      start_period: 10s

  api:
    build: .
    command: python -m api.main
    ports:
      - "8001:8001"
    environment:
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-bge-m3}
      - LLM_MODEL=${LLM_MODEL:-deepseek}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - DATABASE_URL=postgresql://jobsense:jobsense123@postgres:5432/jobsense
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
      - ${USERPROFILE}/.cache/huggingface:/root/.cache/huggingface
    depends_on:
      mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      retries: 5
      start_period: 15s

  frontend:
    build: .
    command: streamlit run web/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - JOBSENSE_API_URL=http://api:8001
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
